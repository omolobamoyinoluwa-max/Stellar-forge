name: Docker Development Environment

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'docker-compose.yml'
      - 'frontend/Dockerfile.dev'
      - 'contracts/Dockerfile.dev'
      - '.github/workflows/docker.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'docker-compose.yml'
      - 'frontend/Dockerfile.dev'
      - 'contracts/Dockerfile.dev'
      - '.github/workflows/docker.yml'

jobs:
  test-docker-setup:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Test Docker Compose build
      run: |
        docker compose build

    - name: Start services
      run: |
        docker compose up -d

    - name: Wait for services
      run: |
        sleep 30

    - name: Test frontend service
      run: |
        curl -f http://localhost:5173 || (docker compose logs frontend && exit 1)

    - name: Test contract builder tools
      run: |
        docker compose exec -T contract-builder bash -c "which cargo && which stellar"

    - name: Test contract compilation
      run: |
        docker compose exec -T contract-builder bash -c "cd token-factory && cargo check --target wasm32-unknown-unknown"

    - name: Test frontend build
      run: |
        docker compose exec -T frontend npm run build

    - name: Show service logs on failure
      if: failure()
      run: |
        echo "=== Frontend logs ==="
        docker compose logs frontend
        echo "=== Contract builder logs ==="
        docker compose logs contract-builder

    - name: Clean up
      if: always()
      run: |
        docker compose down -v